[build-system]
requires = ["setuptools>=64", "pybind11>=2.11", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "rthym-moc"
version = "0.1.0"
description = "High-speed 1-D Method of Characteristics transient hydraulic solver (C++ core, Python API)"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.9"
dependencies = ["numpy>=1.21"]
keywords = ["hydraulics", "waterhammer", "MOC", "transient", "pipe flow"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: C++",
    "Topic :: Scientific/Engineering",
]

[project.optional-dependencies]
inp  = ["wntr>=0.4"]
dev  = ["pytest", "numpy", "matplotlib"]
docs = ["sphinx", "numpydoc"]

[tool.setuptools.packages.find]
where = ["."]
include = ["rthym_moc*"]
