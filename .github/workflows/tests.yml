name: tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  pytest:
    runs-on: ${{ matrix.os }}
    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: utf-8
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        python-version:
          - "3.9"
          - "3.10"
          - "3.11"
          - "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Upgrade packaging tools
        run: python -m pip install --upgrade pip wheel "setuptools>=65,<81"

      - name: Install package and test dependencies
        run: python -m pip install -e ".[dev,inp]"

      - name: Run test suite
        run: pytest -ra --durations=20

  coverage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"
          cache: pip

      - name: Upgrade packaging tools
        run: python -m pip install --upgrade pip wheel "setuptools>=65,<81"

      - name: Install package and coverage dependencies
        run: python -m pip install -e ".[dev,inp]"

      - name: Measure test coverage
        run: pytest -ra --durations=20 --cov=rthym_moc --cov-report=term-missing --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          use_oidc: true
          files: ./coverage.xml
          fail_ci_if_error: true
          skip_validation: true

  lint-and-types:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"
          cache: pip

      - name: Upgrade packaging tools
        run: python -m pip install --upgrade pip wheel "setuptools>=65,<81"

      - name: Install lint and type-check dependencies
        run: python -m pip install -e ".[dev,inp]"

      - name: Run Ruff
        run: ruff check rthym_moc

      - name: Run mypy
        run: mypy rthym_moc

  dvcm-tests:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"
          cache: pip

      - name: Upgrade packaging tools
        run: python -m pip install --upgrade pip wheel "setuptools>=65,<81"

      - name: Install package and DVCM test dependencies
        run: python -m pip install -e ".[dev,inp]"

      - name: Run DVCM marker-selected tests
        run: pytest -q -m dvcm

  dvcm-targeted-benchmark:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"
          cache: pip

      - name: Upgrade packaging tools
        run: python -m pip install --upgrade pip wheel "setuptools>=65,<81"

      - name: Install package and benchmark-gate dependencies
        run: python -m pip install -e ".[dev,inp]"

      - name: Run targeted DVCM baseline checks
        run: pytest -q tests/test_joukowsky_rthym.py tests/test_long_pipe_valve.py

  verification-notebooks:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"
          cache: pip

      - name: Upgrade packaging tools
        run: python -m pip install --upgrade pip wheel "setuptools>=65,<81"

      - name: Install package and notebook smoke dependencies
        run: python -m pip install -e ".[dev,inp]"

      - name: Regenerate verification notebooks from templates
        run: python scripts/build_verification_notebooks.py

      - name: Smoke-test verification notebooks (headless)
        run: pytest -q tests/test_verification_notebooks_smoke.py --tb=short
