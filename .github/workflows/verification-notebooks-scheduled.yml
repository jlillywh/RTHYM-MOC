# Weekly headless execution of slow verification notebooks (maintainer signal).
name: Verification notebooks (scheduled)

on:
  schedule:
    - cron: "0 6 * * 1"  # Mondays 06:00 UTC
  workflow_dispatch:

jobs:
  slow-notebooks:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"
          cache: pip

      - name: Upgrade packaging tools
        run: python -m pip install --upgrade pip wheel "setuptools>=65,<81"

      - name: Install package and dependencies
        run: python -m pip install -e ".[dev,inp]"

      - name: Regenerate verification notebooks
        run: python scripts/build_verification_notebooks.py

      - name: Run fast + slow verification notebooks
        run: python scripts/verify_verification_notebooks.py --include-slow
