# Maintainer workflow: compile wasm_bindings.cpp and run binding smoke tests.

name: wasm-regression

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  wasm-regression:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Upgrade packaging tools
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Install package and test dependencies
        run: python -m pip install -e ".[dev,inp]"

      - name: Set up Emscripten
        uses: mymindstorm/setup-emsdk@v16
        with:
          version: latest

      - name: Build WASM artifacts
        run: bash build_wasm.sh

      - name: Run WASM-facing regression tests
        run: pytest -q bindings/wasm/tests --override-ini="addopts="
